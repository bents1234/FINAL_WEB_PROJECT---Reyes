<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="user-style.css">
    <title>NBS-DS | Order</title>
</head>
<body>
    <nav>
        <div class="logo-area"><span>NBS-DS</span></div>
        <div class="nav-links">
            <a href="dash-library.html">LIBRARY</a>
            <a href="dash-topup.html">TOP UP</a>
            <a href="dash-order.html">ORDER</a>
            <a href="dash-profile.html">PROFILE</a>
        </div>
    </nav>
    <div style="padding: 0 5%;">
        <div class="library-header"><div class="red-bar"></div>ORDER</div>

            <div class="order-row">
                📍 Delivery Address<br>
                <span style="font-weight:normal;">Juan Dela Cruz (+63) 912 345 6789<br>123 Bookworm Lane, Quezon City, Metro Manila</span>

        </div>

        <div style="display: flex; justify-content: flex-end; margin-top: 15px;">
