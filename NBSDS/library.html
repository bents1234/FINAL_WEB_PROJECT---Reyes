<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NBS-DS | Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-area">
            <img src="logo.png" alt="Logo" class="logo-img">
            <span class="nbs-text">NBS-DS</span>
        </div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="library.html">LIBRARY</a>
            <a href="login.html">TOP UP</a>
            <a href="login.html">ORDER</a>
            <a href="login.html">LOGIN/SIGNUP</a>
        </div>
    </nav>

    <section class="section-container">
        <div class="title-group">
            <h2>Library</h2>
        </div>

        <div class="library-filters">
            <input type="text" id="search" placeholder="SEARCH BOOKS..." onkeyup="filterLibrary()">
            <select class="dark-select" id="genreSelect" onchange="filterLibrary()">
                <option value="ALL GENRE">ALL GENRE</option>
                <option value="Classic">CLASSIC</option>
                <option value="Fiction">FICTION</option>
                <option value="Romance">ROMANCE</option>
                <option value="Drama">DRAMA</option>
            </select>
            <select class="dark-select" id="priceSort" onchange="filterLibrary()">
                <option value="DEFAULT">PRICE: DEFAULT</option>
                <option value="MOST EXPENSIVE">MOST EXPENSIVE</option>
                <option value="LEAST EXPENSIVE">LEAST EXPENSIVE</option>
            </select>
            <select class="dark-select" id="dateSort" onchange="filterLibrary()">
                <option value="DEFAULT">DATE: DEFAULT</option>
                <option value="LATEST">LATEST</option>
                <option value="OLDEST">OLDEST</option>
            </select>
        </div>

        <div class="book-grid-5" id="library-grid"></div>
    </section>

    <footer>© 2026 National Book Store Digital Shelf</footer>
    <script src="script.js"></script>
</body>
</html>
