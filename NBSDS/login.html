<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NBS-DS | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-header">
        <a href="index.html" class="back-btn">◁ BACK TO HOME</a>
    </div>

    <div class="login-card">
        <img src="logo.png" alt="Logo" style="height: 100px; margin-bottom: 25px;">
        <h1 style="text-transform: uppercase; letter-spacing: 3px; font-weight: 900;">Login to NBS-DS</h1>
        
        <label>Email Address</label>
        <input type="text" id="loginEmail" placeholder="juan@gmail.com">
        
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="juan1234">
        
        <button class="signin-btn" onclick="checkLogin()">Sign in</button>
        
        <p style="margin-top: 25px; font-size: 14px;">Don't have an account? 
            <a href="signup.html" style="color: blue; text-decoration: none; font-weight: bold;">Sign up</a>
        </p>
    </div>

    <footer>© 2026 National Book Store Digital Shelf</footer>

    <script>
        function checkLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            if (email === "juan@gmail.com" && pass === "juan1234") {
                window.location.href = "dash-library.html";
            } else {
                alert("Access Denied: Please use the correct credentials.");
            }
        }
    </script>
</body>
</html>
