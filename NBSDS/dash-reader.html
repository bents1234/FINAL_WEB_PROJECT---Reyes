<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="user-style.css">
    <title>NBS-DS | Reader</title>
</head>
<body>
    <nav>
        <div class="logo-area">
            <img src="logo.png" alt="LOGO">
            <span id="navTitle"></span>
        </div>
        <div class="nav-links">
            <button id="backToProfile" class="btn-yellow" style="width: auto; padding: 5px 15px;">BACK TO INFO</button>
        </div>
    </nav>
    <section class="section-container" style="max-width: 800px; margin: 30px auto; background: #fff; border: 1px solid #000; padding: 50px;">
        <h1 style="text-align: center; text-transform: uppercase;">Chapter 1</h1>
        <p style="font-family: serif; font-size: 20px; line-height: 1.8;">Content Placeholder: Chapter 2 and beyond are coming soon.</p>
    </section>
    <script src="user-script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const book = books.find(b => b.id == id);
        if(book) {
            document.getElementById('navTitle').innerText = "READING: " + book.name;
            document.getElementById('backToProfile').onclick = () => location.href = `dash-book-profile.html?id=${id}`;
        }
    </script>
</body>
</html>
